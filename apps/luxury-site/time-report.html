<script>
    // --- SECURE WORKER REGISTRY ---
    const crew = {
        "domingo": { key: "5050", rate: 50 },
        "franco":  { key: "2525", rate: 25 },
        "kevin":   { key: "2525", rate: 25 },
        "carlos":  { key: "2525", rate: 25 },
        "gabriel": { key: "2525", rate: 25 },
        "rolando": { key: "2525", rate: 25 },
        "oscar":   { key: "2525", rate: 25 },
        "lambro":  { key: "2525", rate: 25 }
    };

    let sessionUser = sessionStorage.getItem('active_worker');

    if (!sessionUser) {
        const id = prompt("WORKER ID (First Name):").toLowerCase();
        const pin = prompt("ENTER WORKER KEY:");

        if (crew[id] && pin === crew[id].key) {
            sessionStorage.setItem('active_worker', id);
            sessionStorage.setItem('active_rate', crew[id].rate);
            sessionUser = id;
        } else {
            alert("ENTRY DENIED");
            window.location.href = "index.html";
        }
    }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Labor | Rooted Capital Co.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .stepper { background: #111; width: 100px; height: 100px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 1px solid #222; }
        .stepper:active { background: #A7F3D0; color: black; transform: scale(0.9); }
        .label-gold { color: #C5A059; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5em; }
    </style>
</head>
<body class="p-8 flex flex-col items-center justify-center min-h-screen">
    <div class="w-full max-w-sm text-center">
        
        <header class="mb-12">
            <span class="label-gold">Authenticated Personnel</span>
            <h1 id="userName" class="text-5xl font-light italic uppercase mt-2 tracking-tighter">---</h1>
        </header>

        <div class="mb-12">
            <span class="label-gold block mb-4">Project Site</span>
            <select id="site" class="bg-transparent text-[#A7F3D0] text-2xl font-bold outline-none border-b border-white/10 pb-2 w-full text-center">
                <option value="185-W-Lake">185 W Lake</option>
                <option value="3048-Duke">3048 Duke</option>
                <option value="2081-Dodson">2081 Dodson</option>
                <option value="2139-W-Cedar">2139 W Cedar</option>
            </select>
        </div>

        <div class="py-10">
            <span class="label-gold">Daily Hours Log</span>
            <div id="hrs" class="text-[120px] font-bold leading-none my-6 text-white tracking-tighter">0</div>
            
            <div class="flex justify-center gap-10">
                <button class="stepper" onclick="adj(-1)">-</button>
                <button class="stepper" onclick="adj(1)">+</button>
            </div>
        </div>

        <button onclick="submitDaily()" class="w-full mt-16 bg-[#A7F3D0] text-black py-7 rounded-full font-bold uppercase tracking-widest text-xs shadow-2xl shadow-emerald-500/20 active:scale-95 transition">
            Submit Daily Labor
        </button>

        <button onclick="sessionStorage.clear(); location.reload();" class="mt-10 text-gray-700 text-[10px] uppercase tracking-widest">Switch Worker</button>
    </div>

    <script>
        document.getElementById('userName').innerText = sessionUser;
        let count = 0;
        function adj(v) { count = Math.max(0, count + v); document.getElementById('hrs').innerText = count; }

        function submitDaily() {
            const project = document.getElementById('site').value;
            alert(`SUCCESS: ${count} hours logged for ${sessionUser} at ${project}.`);
            // Reset for next day
            location.reload();
        }
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Audit | Rooted Capital Co.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --mint: #A7F3D0; }
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 18px 10px; color: white; width: 100%; font-size: 18px; outline: none; text-align: center; transition: 0.3s; }
        .glass-input:focus { border-color: var(--mint); background: rgba(167,243,208,0.05); }
        .label-gold { color: var(--gold); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4em; }
    </style>
</head>
<body class="p-8 md:p-20">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-16 pb-8 border-b border-white/10">
            <div>
                <span class="label-gold">Field Operations Ledger</span>
                <h1 class="text-5xl font-light tracking-tighter italic">Weekly <span class="font-semibold not-italic">Burn Audit.</span></h1>
            </div>
            <select id="projectSite" class="bg-transparent border-b border-[#A7F3D0] text-[#A7F3D0] text-xl py-2 outline-none uppercase tracking-widest font-light">
                <option value="185-W-Lake">185 W Lake</option>
                <option value="3048-Duke">3048 Duke</option>
                <option value="2081-Dodson">2081 Dodson</option>
                <option value="2139-W-Cedar">2139 W Cedar</option>
            </select>
        </div>

        <form id="weeklyAuditForm">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="label-gold opacity-50">
                            <th class="pb-10">Personnel</th>
                            <th class="pb-10 text-center">M</th><th class="pb-10 text-center">T</th>
                            <th class="pb-10 text-center">W</th><th class="pb-10 text-center">T</th>
                            <th class="pb-10 text-center">F</th><th class="pb-10 text-center">S</th>
                            <th class="pb-10 text-right">Total</th>
                        </tr>
                    </thead>
                    <tbody id="crewTable" class="divide-y divide-white/5"></tbody>
                </table>
            </div>

            <div class="mt-20 pt-12 border-t border-white/10 flex flex-col md:flex-row justify-between items-center gap-10">
                <div>
                    <p class="label-gold mb-2">Institutional Weekly Burn</p>
                    <p id="grandTotalDisplay" class="text-7xl font-light tracking-tighter text-white">0 <span class="text-sm text-gray-600 uppercase tracking-widest font-bold">Hours</span></p>
                </div>
                <div class="flex gap-4 w-full md:w-auto">
                    <button type="button" onclick="exportToAppFolio()" class="flex-1 border border-white/20 text-white px-10 py-6 rounded-full font-bold uppercase tracking-widest text-[10px] hover:bg-white hover:text-black transition-all">
                        AppFolio CSV
                    </button>
                    <button type="submit" class="flex-1 bg-[#A7F3D0] text-[#064E3B] px-12 py-7 rounded-full font-bold uppercase tracking-[0.3em] text-[10px] hover:bg-white transition-all shadow-2xl shadow-emerald-500/20">
                        Route to Mauny
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script>
        // Full roster from field logs
        const crew = ["Domingo", "Franco", "Kevin", "Carlos", "Gabriel", "Rolando", "Oscar", "Lambro"];
        const tbody = document.getElementById('crewTable');

        crew.forEach(name => {
            const row = document.createElement('tr');
            row.className = "worker-row";
            row.innerHTML = `
                <td class="py-8 font-light uppercase text-xs tracking-widest">${name}</td>
                <td class="p-2"><input type="number" step="0.5" class="glass-input day-input"></td>
                <td class="p-2"><input type="number" step="0.5" class="glass-input day-input"></td>
                <td class="p-2"><input type="number" step="0.5" class="glass-input day-input"></td>
                <td class="p-2"><input type="number" step="0.5" class="glass-input day-input"></td>
                <td class="p-2"><input type="number" step="0.5" class="glass-input day-input"></td>
                <td class="p-2"><input type="number" step="0.5" class="glass-input day-input"></td>
                <td class="py-8 text-right font-bold text-[#C5A059] text-2xl worker-total">0</td>
            `;
            tbody.appendChild(row);
        });

        // Your original real-time calculation logic
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('day-input')) {
                const row = e.target.closest('.worker-row');
                const inputs = row.querySelectorAll('.day-input');
                let rowTotal = 0;
                inputs.forEach(i => rowTotal += parseFloat(i.value || 0));
                row.querySelector('.worker-total').innerText = rowTotal;

                let grandTotal = 0;
                document.querySelectorAll('.day-input').forEach(i => grandTotal += parseFloat(i.value || 0));
                document.getElementById('grandTotalDisplay').innerHTML = \`\${grandTotal} <span class="text-sm text-gray-600 uppercase tracking-widest font-bold">Hours</span>\`;
            }
        });

        // AppFolio Export Engine
        function exportToAppFolio() {
            const site = document.getElementById('projectSite').value;
            let csvContent = "data:text/csv;charset=utf-8,Property,Employee,Date,Hours,Description\\n";
            document.querySelectorAll('.worker-row').forEach(row => {
                const name = row.cells[0].innerText;
                const hours = row.querySelector('.worker-total').innerText;
                if(parseFloat(hours) > 0) {
                    csvContent += \`\${site},\${name},\${new Date().toLocaleDateString()},\${hours},Construction Labor\\n\`;
                }
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", \`AppFolio_Audit_\${site}.csv\`);
            document.body.appendChild(link);
            link.click();
        }

        // Your original Approval Route Simulation
        document.getElementById('weeklyAuditForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = "ROUTING TO PRINCIPAL...";
            btn.disabled = true;
            setTimeout(() => {
                btn.innerHTML = "PENDING APPROVAL";
                btn.style.background = "#C5A059";
                btn.style.color = "#000";
                alert("Institutional Ledger Synced. Mauny has been notified for final audit approval.");
            }, 2000);
        });
    </script>
</body>
</html>
