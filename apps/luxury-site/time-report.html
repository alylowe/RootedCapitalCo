<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Audit | Rooted Capital Co.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --mint: #A7F3D0; }
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* The "Luxury Box" Input Style from your screenshot */
        .glass-input { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            padding: 18px 10px; 
            color: white; 
            width: 100%; 
            font-size: 18px; 
            outline: none; 
            text-align: center;
            transition: all 0.3s ease;
        }
        .glass-input:focus { border-color: var(--mint); background: rgba(167, 243, 208, 0.05); }
        
        .label-gold { color: var(--gold); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4em; }
        .worker-name { font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; font-size: 13px; color: #fff; }
        
        /* Sticky Header for Site Selection */
        .sticky-nav { background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); z-index: 100; }
        
        tr.worker-row { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.3s; }
        tr.worker-row:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="p-6 md:p-20 pt-10">
    <div class="max-w-7xl mx-auto">
        
        <div class="flex justify-between items-end mb-16 pb-8 sticky-nav">
            <div>
                <span class="label-gold block mb-2">Operational Oversight</span>
                <h1 class="text-5xl font-light tracking-tighter italic leading-none">Weekly <span class="font-semibold not-italic">Time Ledger.</span></h1>
            </div>
            <div class="text-right">
                <select id="projectSite" class="bg-transparent border-b border-[#A7F3D0] text-[#A7F3D0] text-xl py-2 outline-none cursor-pointer uppercase tracking-widest font-light">
                    <option value="185-W-Lake">185 W Lake</option>
                    <option value="3048-Duke">3048 Duke</option>
                    <option value="2081-Dodson">2081 Dodson</option>
                    <option value="2139-W-Cedar">2139 W Cedar</option>
                </select>
            </div>
        </div>

        <form id="weeklyAuditForm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="label-gold opacity-60">
                            <th class="pb-10 font-bold">Personnel</th>
                            <th class="pb-10 text-center">Mon</th>
                            <th class="pb-10 text-center">Tue</th>
                            <th class="pb-10 text-center">Wed</th>
                            <th class="pb-10 text-center">Thu</th>
                            <th class="pb-10 text-center">Fri</th>
                            <th class="pb-10 text-center">Sat</th>
                            <th class="pb-10 text-right">Total</th>
                        </tr>
                    </thead>
                    <tbody id="crewTable">
                        </tbody>
                </table>
            </div>

            <div class="mt-20 pt-12 border-t border-white/10 flex flex-col md:flex-row justify-between items-center gap-10">
                <div>
                    <p class="label-gold mb-2">Institutional Weekly Burn</p>
                    <p id="grandTotalDisplay" class="text-7xl font-light text-white tracking-tighter">0 <span class="text-sm text-gray-600 uppercase tracking-widest font-bold">Hours</span></p>
                </div>
                <button type="submit" class="w-full md:w-auto bg-[#A7F3D0] text-[#064E3B] px-20 py-7 rounded-full font-bold uppercase tracking-[0.3em] text-[12px] hover:bg-white transition-all shadow-2xl shadow-emerald-500/20 active:scale-95">
                    Route to Mauny for Approval
                </button>
            </div>
        </form>
    </div>

    <script>
        const crew = ["Domingo", "Franco", "Kevin", "Carlos", "Gabriel", "Rolando", "Oscar", "Lambro"];
        const tbody = document.getElementById('crewTable');

        // Build the roster automatically
        crew.forEach(name => {
            const row = document.createElement('tr');
            row.className = "worker-row";
            row.innerHTML = `
                <td class="py-8 worker-name">${name}</td>
                <td class="py-4 px-2"><input type="number" step="0.5" placeholder="0" class="glass-input day-input"></td>
                <td class="py-4 px-2"><input type="number" step="0.5" placeholder="0" class="glass-input day-input"></td>
                <td class="py-4 px-2"><input type="number" step="0.5" placeholder="0" class="glass-input day-input"></td>
                <td class="py-4 px-2"><input type="number" step="0.5" placeholder="0" class="glass-input day-input"></td>
                <td class="py-4 px-2"><input type="number" step="0.5" placeholder="0" class="glass-input day-input"></td>
                <td class="py-4 px-2"><input type="number" step="0.5" placeholder="0" class="glass-input day-input"></td>
                <td class="py-8 text-right font-bold text-2xl text-[#C5A059] worker-total tracking-tighter">0</td>
            `;
            tbody.appendChild(row);
        });

        // Real-time calculation logic
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('day-input')) {
                const row = e.target.closest('.worker-row');
                const inputs = row.querySelectorAll('.day-input');
                let rowTotal = 0;
                inputs.forEach(i => rowTotal += parseFloat(i.value || 0));
                row.querySelector('.worker-total').innerText = rowTotal;

                let grandTotal = 0;
                document.querySelectorAll('.day-input').forEach(i => grandTotal += parseFloat(i.value || 0));
                document.getElementById('grandTotalDisplay').innerHTML = \`\${grandTotal} <span class="text-sm text-gray-600 uppercase tracking-widest font-bold">Hours</span>\`;
            }
        });

        // Simulation of the Approval Route
        document.getElementById('weeklyAuditForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = "ROUTING TO PRINCIPAL...";
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = "PENDING APPROVAL";
                btn.style.background = "#C5A059";
                btn.style.color = "#000";
                alert("Institutional Ledger Synced. Mauny has been notified for final audit approval.");
            }, 2000);
        });
    </script>
</body>
</html>
